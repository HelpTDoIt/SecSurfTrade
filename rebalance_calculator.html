      // Loaded at runtime from fidelity_rebalancer/accounts.json (gitignored).

      function parseCSV(text) {
        const lines = text
          .split(/\r?\n/)
          .filter((l) => l.trim() && !l.startsWith('"'));
        if (lines.length < 2) return [];
        const hdr = lines[0].split(",").map((h) => h.trim());
        return lines
          .slice(1)
          .map((line) => {
            const v = line.split(",");
            const o = {};
            hdr.forEach((h, i) => {
              // Strip $ ANYWHERE (not just leading) so Fidelity's signed
              // dollar values like '-$99105.05' parse correctly. Prior
              // leading-only strip silently turned those into 0.
              o[h] = (v[i] || "")
                .trim()
                .replace(/[$,]/g, "")
                .replace(/[+%]/g, "");
            });
            return o;
          })
          .filter((r) => r["Symbol"]);
      }
      function consolidate(rows) {
        const m = {};
        let name = "";
        let pendingActivity = 0;
        rows.forEach((r) => {
          if (!name && r["Account Name"]) name = r["Account Name"];
          const s = r["Symbol"];
          if (!s) return;
          // 'Pending activity' is a signed dollar adjustment, not a position.
          // Capture separately so cash gate can use it; don't pollute positions.
          if (s.trim().toLowerCase() === "pending activity") {
            pendingActivity += parseFloat(r["Current Value"]) || 0;
            return;
          }
          const q = parseFloat(r["Quantity"]) || 0,
            v = parseFloat(r["Current Value"]) || 0,
            p = parseFloat(r["Last Price"]) || 0;
          if (m[s]) {
            m[s].quantity += q;
            m[s].value += v;
          } else m[s] = { symbol: s, quantity: q, value: v, price: p };
        });
        return { accountName: name, positions: m, pendingActivity };
      }
      function sumFills(fills) {
        if (!fills?.length) return { qty: 0, proceeds: 0, avg: 0 };
        const qty = fills.reduce((s, f) => s + (f.qty || 0), 0);
        const proceeds = fills.reduce(
          (s, f) => s + (f.qty || 0) * (f.price || 0),
          0,
        );
        return { qty, proceeds, avg: qty > 0 ? proceeds / qty : 0 };
      }
      function hasRealFills(arr) {
        return arr?.some((f) => f.qty > 0 && f.price > 0) || false;
      }

      function calcTrades(
        cfg,
        positions,
        signals,
        closes,
        pendingActivity = 0,
      ) {
        const { strategies, cashReserve } = cfg;
        const sN = Object.keys(strategies);
        const sPos = {};
        let totalStratVal = 0;
        sN.forEach((s) => {
          const t = signals[s]?.current;
          if (t && positions[t]) {
            sPos[s] = {
              ticker: t,
              value: positions[t].value,
              quantity: positions[t].quantity,
              price: positions[t].price,
            };
            totalStratVal += positions[t].value;
          } else sPos[s] = { ticker: t || "", value: 0, quantity: 0, price: 0 };
        });
        const spaxx = positions["SPAXX**"]?.value || 0;
        // Effective cash = settled SPAXX + signed pending activity.
        // Negative pending = already-committed funds; positive = unsettled
        // incoming. Mirrors engine/calculator.py calc_trades.
        const effectiveCash = spaxx + (pendingActivity || 0);
        const deplCash = Math.max(0, effectiveCash - cashReserve);
        const totalPool = totalStratVal + deplCash;
        const trading = [],
          holding = [];
        sN.forEach((s) => {
          signals[s]?.new && signals[s].new !== signals[s].current
            ? trading.push(s)
            : holding.push(s);
        });
        let oneShare = 0;
        sN.forEach((s) => {
          oneShare +=
            closes[signals[s]?.new || signals[s]?.current] ||
            sPos[s]?.price ||
            0;
        });
        const cashOk = deplCash > oneShare;
        const sells = [];
        const soldTickers = new Set();
        trading.forEach((s) => {
          const p = sPos[s];
          if (p?.quantity > 0 && !soldTickers.has(p.ticker)) {
            soldTickers.add(p.ticker);
            const lim = closes[p.ticker] || p.price;
            sells.push({
              strategy: s,
              ticker: p.ticker,
              quantity: p.quantity,
              limitPrice: lim,
              estProceeds: p.quantity * lim,
            });
          }
        });
        const estSell = sells.reduce((s, x) => s + x.estProceeds, 0);
        const buys = allocBuys(
          sN,
          strategies,
          signals,
          closes,
          sPos,
          trading,
          holding,
          cashOk,
          estSell,
          deplCash,
          totalPool,
        );
        return { sells, buys, totalPool, deplCash, estSell, cashOk, sPos };
      }

      function allocBuys(
        sNames,
        strats,
        signals,
        closes,
        sPos,
        trading,
        holding,
        cashOk,
        sellProceeds,
        deplCash,
        totalPool,
      ) {
        const avail = sellProceeds + deplCash;
        const out = [];
        if (trading.length === 0 && !cashOk) return out;
        const mk = (s, tk, d, p, rb) => {
          if (p > 0 && d > 0)
            out.push({
              strategy: s,
              ticker: tk,
              dollarTarget: d,
              limitPrice: p,
              isRebalance: rb,
              targetValue: strats[s] * totalPool,
            });
        };
        if (trading.length === 0 && cashOk) {
          sNames.forEach((s) => {
            const d = strats[s] * totalPool - (sPos[s]?.value || 0);
            if (d > 0)
              mk(
                s,
                signals[s]?.current,
                d,
                closes[signals[s]?.current] || sPos[s]?.price || 0,
                true,
              );
          });
        } else if (trading.length >= 1 && !cashOk) {
          if (trading.length === 1) {
            const s = trading[0];
            mk(s, signals[s].new, avail, closes[signals[s].new] || 0, false);
          } else {
            const t = trading.reduce((a, s) => a + strats[s], 0);
            trading.forEach((s) =>
              mk(
                s,
                signals[s].new,
                (strats[s] / t) * avail,
                closes[signals[s].new] || 0,
                true,
              ),
            );
          }
        } else if (cashOk) {
          let spent = 0;
          trading.forEach((s) => {
            const tgt = strats[s] * totalPool;
            const tk = signals[s].new;
            const p = closes[tk] || 0;
            if (p > 0 && tgt > 0) {
              const c = Math.min(tgt, avail - spent);
              if (c > 0) {
                mk(s, tk, c, p, true);
                spent += c;
              }
            }
          });
          holding.forEach((s) => {
            const d = strats[s] * totalPool - (sPos[s]?.value || 0);
            const tk = signals[s]?.current;
            const p = closes[tk] || sPos[s]?.price || 0;
            if (d > 0 && p > 0) {
              const c = Math.min(d, avail - spent);
              if (c > 0) {
                mk(s, tk, c, p, true);
                spent += c;
              }
            }
          });
        }
        let tot = out.reduce((s, a) => s + a.dollarTarget, 0);
        if (tot > avail && tot > 0) {
          const r = avail / tot;
          out.forEach((a) => {
            a.dollarTarget *= r;
          });
        }
        out.forEach((a) => {
          a.shares =
            a.limitPrice > 0 ? Math.floor(a.dollarTarget / a.limitPrice) : 0;
          a.estCost = a.shares * a.limitPrice;
        });
        return out.filter((a) => a.shares > 0);
      }

      function BI({ value, onCommit, placeholder, style }) {
        const [local, setLocal] = useState(String(value ?? ""));
        const focused = useRef(false);
        useEffect(() => {
          if (!focused.current) setLocal(String(value ?? ""));
        }, [value]);
        return (
          <input
            style={style || S.inpSm}
            type="text"
            inputMode="decimal"
            placeholder={placeholder}
            value={local}
            onFocus={() => {
              focused.current = true;
            }}
            onChange={(e) => {
              const v = e.target.value;
              if (v === "" || v === "." || /^-?\d*\.?\d*$/.test(v)) setLocal(v);
            }}
            onBlur={() => {
              focused.current = false;
              const v = local;
              setTimeout(() => onCommit(v), 0);
            }}
            onKeyDown={(e) => {
              if (e.key === "Enter") e.target.blur();
            }}
          />
        );
      }

      function FillRowComp({ fill, onCommit, onRemove }) {
        const priceRef = useRef(String(fill.price || ""));
        const qtyRef = useRef(String(fill.qty || ""));
        const [priceVal, setPriceVal] = useState(String(fill.price || ""));
        const [qtyVal, setQtyVal] = useState(String(fill.qty || ""));
        const focusCount = useRef(0);
        const commitTimer = useRef(null);
        priceRef.current = priceVal;
        qtyRef.current = qtyVal;
        useEffect(() => {
          if (focusCount.current === 0) {
            setPriceVal(String(fill.price || ""));
            setQtyVal(String(fill.qty || ""));
          }
        }, [fill.price, fill.qty]);
        const scheduleCommit = () => {
          clearTimeout(commitTimer.current);
          commitTimer.current = setTimeout(() => {
            if (focusCount.current > 0) return;
            onCommit(
              parseFloat(priceRef.current) || 0,
              parseFloat(qtyRef.current) || 0,
            );
          }, 150);
        };
        const handleFocus = () => {
          focusCount.current++;
          clearTimeout(commitTimer.current);
        };
        const handleBlur = () => {
          focusCount.current = Math.max(0, focusCount.current - 1);
          scheduleCommit();
        };
        const ok = (v) => v === "" || v === "." || /^-?\d*\.?\d*$/.test(v);
        const p = parseFloat(priceVal) || 0;
        const q = parseFloat(qtyVal) || 0;
        return (

            <td style={S.td}>
              <input
                style={S.inpSm}
                type="text"
                inputMode="decimal"
                placeholder="Price"
                value={priceVal}
                onFocus={handleFocus}
                onBlur={handleBlur}
                onChange={(e) => {
                  if (ok(e.target.value)) setPriceVal(e.target.value);
                }}
                onKeyDown={(e) => {
                  if (e.key === "Enter") e.target.blur();
                }}
              />
            </td>

              style={{

                color: "#484f58",
                textAlign: "center",
                padding: "5px 2px",
                fontSize: 10,

              <input
                style={S.inpSm}
                type="text"
                inputMode="decimal"
                placeholder="Shares"
                value={qtyVal}
                onFocus={handleFocus}
                onBlur={handleBlur}
                onChange={(e) => {
                  if (ok(e.target.value)) setQtyVal(e.target.value);
                }}
                onKeyDown={(e) => {
                  if (e.key === "Enter") e.target.blur();
                }}
              />
            </td>
            <td style={{ ...S.tdr, fontSize: 11 }}>
              {p > 0 && q > 0 ? fmt(p * q) : "—"}
            </td>
            <td style={{ ...S.td, padding: "5px 4px" }}>
              <button style={S.btnDel} onClick={onRemove}>
                ✕

            </td>

        );

      // localStorage autosave: the calculator's entered orders/fills live only
      // in React state, so a reload or server restart would wipe them. We persist
      // the user-entered slices under this key and restore them on mount.
      const SAVE_KEY = "secsurf_calc_state_v1";

      function App() {
        // Read the saved blob exactly once (lazy, via a ref) so the useState
        // initializers below can seed from it without a flash or effect ordering
        // races against the auto-import / accounts.json fetch effects.
        const savedRef = useRef(null);
        // restoredAtRef holds the timestamp string shown in the restore banner,
        // or null when nothing was restored (different day or no saved data).
        const restoredAtRef = useRef(undefined); // undefined = not yet evaluated
        if (savedRef.current === null) {
          restoredAtRef.current = null; // default: no restore
          try {
            const raw = localStorage.getItem(SAVE_KEY);
            if (raw) {
              const parsed = JSON.parse(raw);
              const savedAt = parsed.savedAt;
              if (savedAt) {
                const savedDate = new Date(savedAt);
                const today = new Date();
                const sameDay =
                  savedDate.getFullYear() === today.getFullYear() &&
                  savedDate.getMonth() === today.getMonth() &&
                  savedDate.getDate() === today.getDate();
                if (sameDay) {
                  savedRef.current = parsed;
                  // Format: "Jun 2, 2026, 3:41 PM" (locale-aware)
                  restoredAtRef.current = savedDate.toLocaleString(undefined, {
                    month: "short",
                    day: "numeric",
                    year: "numeric",
                    hour: "numeric",
                    minute: "2-digit",
                  });
                } else {
                  // Stale session from a prior day — discard it entirely.
                  try {
                    localStorage.removeItem(SAVE_KEY);
                  } catch {}
                  savedRef.current = {};
                }
              } else {
                // No savedAt field → old format or tampered blob; discard.
                try {
                  localStorage.removeItem(SAVE_KEY);
                } catch {}
                savedRef.current = {};
              }
            } else {
              savedRef.current = {};
            }
          } catch {
            savedRef.current = {};
          }
        }
        const SAVED = savedRef.current;

        const [tab, setTab] = useState(SAVED.tab ?? "setup");
        const [csv, setCsv] = useState(
          SAVED.csv ?? { roth: "", rollover: "", tod: "" },
        );
        const [signals, setSignals] = useState(SAVED.signals ?? {});
        const [prevCloses, setPrevCloses] = useState(SAVED.prevCloses ?? {});
        const [calculated, setCalc] = useState(SAVED.calculated ?? false);
        const [fills, setFills] = useState(SAVED.fills ?? {});
        const [chunkLimits, setChunkLimits] = useState(SAVED.chunkLimits ?? {});
        // When a state file is imported that carries Python-sized chunks
        // (state.computed.sell_chunks / buy_chunks), they are stored here keyed
        // by account -> "<side>:<strategy>" -> [{idx,shares,limitPrice,cost}].
        // build{Sell,Buy}Chunks prefer this plan over their own flat-$100K logic.
        const [importedChunks, setImportedChunks] = useState(
          SAVED.importedChunks ?? null,
        );
        const importFileRef = useRef(null);
        const importStateRef = useRef(null);
        const [importedPositions, setImportedPositions] = useState(
          SAVED.importedPositions ?? null,
        );
        const [entryRound, setEntryRound] = useState(SAVED.entryRound ?? 0);
        const [fetching, setFetching] = useState(false);
        const [configLoaded, setConfigLoaded] = useState(false);
        const [autoImportBanner, setAutoImportBanner] = useState(null);
        // restoredAt is the human-readable timestamp from restoredAtRef (set once
        // during the ref-init pass above) or null when no session was restored.
        const [restoredAt] = useState(() => restoredAtRef.current ?? null);
        const [restoreBannerDismissed, setRestoreBannerDismissed] =
          useState(false);
        const csvRefRoth = useRef(null);
        const csvRefRollover = useRef(null);
        const csvRefTod = useRef(null);

        // Persist the user-entered slices on every change so a reload or
        // `run.ps1` restart never wipes manually entered orders/fills again.
        useEffect(() => {
          try {
            localStorage.setItem(
              SAVE_KEY,
              JSON.stringify({
                savedAt: Date.now(),
                tab,
                csv,
                signals,
                prevCloses,
                calculated,
                fills,
                chunkLimits,
                importedChunks,
                importedPositions,
                entryRound,
              }),
            );
          } catch {}
        }, [
          tab,
          csv,
          signals,
          prevCloses,
          calculated,
          fills,
          chunkLimits,
          importedChunks,
          importedPositions,
          entryRound,
        ]);

        const parsed = useMemo(() => {
          if (importedPositions) return importedPositions;
          const r = {};
          Object.entries(ACCOUNTS_CONFIG).forEach(([name, cfg]) => {
            if (cfg.csvSlot && csv[cfg.csvSlot])
              r[name] = consolidate(parseCSV(csv[cfg.csvSlot]));
          });
          return r;
        }, [csv, importedPositions, configLoaded]);
        const closes = useMemo(() => {
          const c = { ...prevCloses };
          Object.values(parsed).forEach((a) =>
            Object.values(a.positions).forEach((p) => {
              if (p.price && !c[p.symbol]) c[p.symbol] = p.price;
            }),
          );
          return c;
        }, [parsed, prevCloses]);
        const results = useMemo(() => {
          if (!calculated) return {};
          const r = {};
          Object.entries(ACCOUNTS_CONFIG).forEach(([n, cfg]) => {
            if (parsed[n])
              r[n] = calcTrades(
                cfg,
                parsed[n].positions,
                signals,
                closes,
                parsed[n].pendingActivity || 0,
              );
          });
          return r;
        }, [calculated, parsed, signals, closes]);

        const liveBuys = useMemo(() => {
          if (!calculated) return {};
          const r = {};
          Object.entries(ACCOUNTS_CONFIG).forEach(([acct, cfg]) => {
            if (!parsed[acct] || !results[acct]) return;
            const res = results[acct];
            const af = fills[acct] || {};
            const { strategies } = cfg;
            const sN = Object.keys(strategies);

            let sellFunds = 0;
            let anyReal = false;
            res.sells.forEach((sell) => {
              const sf = af[sell.strategy]?.sells || [];
              if (hasRealFills(sf)) {
                anyReal = true;
                sellFunds += sumFills(sf).proceeds;
              }
            });
            let anyBuyFills = false;
            sN.forEach((s) => {
              if (hasRealFills(af[s]?.buys || [])) anyBuyFills = true;
            });
            if (!anyReal && !anyBuyFills) return;

            const actualAvail = sellFunds + res.deplCash;

            const trading = sN.filter(
              (s) => signals[s]?.new && signals[s].new !== signals[s].current,
            );
            const eligible = res.cashOk ? sN : trading;
            const candidates = [];
            eligible.forEach((s) => {
              const targetVal = strategies[s] * res.totalPool;
              const isTr = trading.includes(s);
              const currentVal = isTr ? 0 : res.sPos[s]?.value || 0;
              const deficit = targetVal - currentVal;
              if (deficit <= 0) return;
              const ticker = isTr ? signals[s].new : signals[s]?.current || "";
              const defLim = closes[ticker] || res.sPos[s]?.price || 0;
              const userLim = chunkLimits[acct]?.["buy:" + s]?.[0] || 0;
              const effectiveLim = userLim > 0 ? userLim : defLim;
              if (effectiveLim <= 0) return;
              candidates.push({
                strategy: s,
                ticker,
                limitPrice: effectiveLim,
                defLimitPrice: defLim,
                targetVal,
                currentVal,
                deficit,
                isRebalance: res.cashOk,
                targetValue: targetVal,
                shares: 0,
                estCost: 0,
              });
            });

            if (candidates.length === 0) {
              r[acct] = { buys: [], actualSell: sellFunds, avail: actualAvail };
              return;
            }

            const totalDeficit = candidates.reduce((s, c) => s + c.deficit, 0);
            candidates.forEach((c) => {
              const propBudget =
                totalDeficit > 0
                  ? (c.deficit / totalDeficit) * actualAvail
                  : actualAvail / candidates.length;
              c.shares = Math.floor(
                Math.min(propBudget, c.deficit) / c.limitPrice,
              );
              c.estCost = c.shares * c.limitPrice;
            });

            let budgetLeft =
              actualAvail - candidates.reduce((s, c) => s + c.estCost, 0);
            let safety = 0;
            while (budgetLeft > 0 && safety < 500) {
              safety++;
              let bestIdx = -1;
              let bestReduction = -Infinity;
              for (let i = 0; i < candidates.length; i++) {
                const c = candidates[i];
                if (c.limitPrice > budgetLeft) continue;
                if (c.estCost + c.limitPrice > c.deficit + c.limitPrice * 0.5)
                  continue;
                const curDrift = Math.abs(
                  (c.currentVal + c.estCost) / res.totalPool -
                    strategies[c.strategy],
                );
                const newDrift = Math.abs(
                  (c.currentVal + c.estCost + c.limitPrice) / res.totalPool -
                    strategies[c.strategy],
                );
                const reduction = curDrift - newDrift;
                if (reduction > bestReduction) {
                  bestReduction = reduction;
                  bestIdx = i;
                }
              }
              if (bestIdx < 0 || bestReduction <= 0) break;
              candidates[bestIdx].shares += 1;
              candidates[bestIdx].estCost =
                candidates[bestIdx].shares * candidates[bestIdx].limitPrice;
              budgetLeft =
                actualAvail - candidates.reduce((s, c) => s + c.estCost, 0);
            }

            const activeCandidates = candidates.filter((c) => c.shares > 0);
            const totalEstCost = activeCandidates.reduce(
              (s, c) => s + c.estCost,
              0,
            );
            const buys = activeCandidates.map((c) => ({
              ...c,
              dollarTarget:
                totalEstCost > 0 ? (c.estCost / totalEstCost) * actualAvail : 0,
            }));

            r[acct] = { buys, actualSell: sellFunds, avail: actualAvail };
          });
          return r;
        }, [calculated, parsed, signals, closes, fills, results, chunkLimits]);

        const tradingS = useMemo(
          () =>
            ALL_STRATS.filter(
              (s) => signals[s]?.new && signals[s].new !== signals[s].current,
            ),
          [signals],
        );
        const tickers = useMemo(() => {
          const t = new Set();
          Object.values(signals).forEach((s) => {
            if (s.current) t.add(s.current);
            if (s.new) t.add(s.new);
          });
          return [...t].sort();
        }, [signals]);

        const addFill = (a, s, t) => {
          setFills((p) => {
            const x = JSON.parse(JSON.stringify(p));
            if (!x[a]) x[a] = {};
            if (!x[a][s]) x[a][s] = { sells: [], buys: [] };
            x[a][s][t === "sell" ? "sells" : "buys"].push({
              id: Date.now() + Math.random(),
              price: 0,
              qty: 0,
            });
            return x;
          });
        };
        const commitFillRow = useCallback((a, s, t, id, price, qty) => {
          setFills((p) => {
            const x = JSON.parse(JSON.stringify(p));
            const fl = x[a]?.[s]?.[t === "sell" ? "sells" : "buys"]?.find(
              (z) => z.id === id,
            );
            if (fl) {
              fl.price = price;
              fl.qty = qty;
            }
            return x;
          });
        }, []);
        const rmFill = (a, s, t, id) => {
          setFills((p) => {
            const x = JSON.parse(JSON.stringify(p));
            if (x[a]?.[s]) {
              const l = t === "sell" ? "sells" : "buys";
              x[a][s][l] = x[a][s][l].filter((z) => z.id !== id);
            }
            return x;
          });
        };
        const setChkLim = useCallback((acct, strat, side, idx, val) => {
          const key = side + ":" + strat;
          setChunkLimits((p) => {
            const x = { ...p };
            if (!x[acct]) x[acct] = {};
            if (!x[acct][key]) x[acct][key] = {};
            x[acct][key] = { ...x[acct][key], [idx]: parseFloat(val) || 0 };
            return x;
          });
        }, []);
        const getChkLim = (acct, strat, side, idx, def) =>
          chunkLimits[acct]?.[side + ":" + strat]?.[idx] || def;

        const getEff = (acctName) => {
          const live = liveBuys[acctName];
          const baseBuys = live ? live.buys : results[acctName]?.buys || [];
          const isLive = !!live;
          const af = fills[acctName] || {};
          const res = results[acctName];
          const avail = isLive
            ? live.avail
            : res
              ? res.estSell + res.deplCash
              : 0;
          const buys = baseBuys.map((b) => {
            const bf = af[b.strategy]?.buys || [];
            const filled = sumFills(bf);
            return {
              ...b,
              filledQty: filled.qty,
              filledProceeds: filled.proceeds,
              filledAvg: filled.avg,
              remDollars: b.dollarTarget - filled.proceeds,
            };
          });
          return { buys, isLive, avail };
        };

        // ── imported-plan chunkers ───────────────────────────────────────────
        // When a Python-sized plan was imported, walk its chunk template in idx
        // order, honoring per-chunk limit edits (getChkLim) and reducing by the
        // remaining shares/dollars (fills). Any remainder beyond the plan (e.g.
        // the calculator recompute totals differ slightly) is appended so no
        // shares/budget are ever silently dropped.
        const buildSellFromTemplate = (
          tmpl,
          remShares,
          acct,
          strat,
          defLim,
        ) => {
          const ch = [];
          let left = remShares;
          let lastIdx = -1;
          for (let k = 0; k < tmpl.length && left > 0.001; k++) {
            const t = tmpl[k];
            lastIdx = t.idx;
            const lim = getChkLim(
              acct,
              strat,
              "sell",
              t.idx,
              t.limitPrice || defLim,
            );
            const shs = Math.min(t.shares, left);
            ch.push({
              idx: t.idx,
              shares: shs,
              limitPrice: lim,
              cost: shs * lim,
            });
            left = Math.max(0, left - shs);
          }
          if (left > 0.001) {
            const lim = getChkLim(acct, strat, "sell", lastIdx + 1, defLim);
            ch.push({
              idx: lastIdx + 1,
              shares: left,
              limitPrice: lim,
              cost: left * lim,
            });
          }
          return ch;
        };

        const buildBuyFromTemplate = (
          tmpl,
          remDollars,
          acct,
          strat,
          defLim,
        ) => {
          if (remDollars < 0.01) return [];
          const ch = [];
          let budget = remDollars;
          let lastIdx = -1;
          for (let k = 0; k < tmpl.length && budget > 0.01; k++) {
            const t = tmpl[k];
            const lim = getChkLim(
              acct,
              strat,
              "buy",
              t.idx,
              t.limitPrice || defLim,
            );
            if (lim <= 0) break;
            lastIdx = t.idx;
            let shs = t.shares;
            if (shs * lim > budget) shs = Math.floor(budget / lim);
            if (shs <= 0) break;
            const cost = shs * lim;
            ch.push({ idx: t.idx, shares: shs, limitPrice: lim, cost });
            budget = Math.max(0, budget - cost);
          }
          if (budget > 0.01) {
            const lim = getChkLim(acct, strat, "buy", lastIdx + 1, defLim);
            if (lim > 0) {
              const shs = Math.floor(budget / lim);
              if (shs > 0)
                ch.push({
                  idx: lastIdx + 1,
                  shares: shs,
                  limitPrice: lim,
                  cost: shs * lim,
                });
            }
          }
          return ch;
        };

        const buildSellChunks = (remShares, defLim, acct, strat) => {
          const tmpl = importedChunks?.[acct]?.["sell:" + strat];
          if (tmpl && tmpl.length)
            return buildSellFromTemplate(tmpl, remShares, acct, strat, defLim);
          const ch = [];
          let left = remShares;
          let i = 0;
          while (left > 0.001) {
            const lim = getChkLim(acct, strat, "sell", i, defLim);
            const dollarVal = left * lim;
            let shs;
            if (dollarVal > CHUNK && lim > 0) {
              const raw = Math.floor(CHUNK / lim);
              shs = roundTo100(raw);
              if (shs <= 0) shs = Math.min(left, 100);
              shs = Math.min(shs, left);
            } else {
              shs = left;
            }
            ch.push({ idx: i, shares: shs, limitPrice: lim, cost: shs * lim });
            left = Math.max(0, left - shs);
            i++;
            if (i > 50) break;
          }
          return ch;
        };

        const buildBuyChunks = (remDollars, defLim, acct, strat) => {
          const tmpl = importedChunks?.[acct]?.["buy:" + strat];
          if (tmpl && tmpl.length)
            return buildBuyFromTemplate(tmpl, remDollars, acct, strat, defLim);
          if (defLim <= 0 || remDollars < 0.01) return [];
          const ch = [];
          let budgetLeft = remDollars;
          let i = 0;
          while (budgetLeft > 0.01) {
            const lim = getChkLim(acct, strat, "buy", i, defLim);
            if (lim <= 0) break;
            const maxShs = Math.floor(budgetLeft / lim);
            if (maxShs <= 0) break;
            let shs;
            if (maxShs * lim > CHUNK) {
              const raw = Math.floor(CHUNK / lim);
              shs = roundTo100(raw);
              if (shs <= 0) shs = 100;
              shs = Math.min(shs, maxShs);
            } else {
              shs = maxShs;
            }
            const cost = shs * lim;
            ch.push({ idx: i, shares: shs, limitPrice: lim, cost });
            budgetLeft = Math.max(0, budgetLeft - cost);
            i++;
            if (i > 50) break;
          }
          return ch;
        };

        const FillSection = ({
          acct,
          strat,
          type,
          targetQty,
          maxShares,
          maxDollars,
        }) => {
          const list =
            fills[acct]?.[strat]?.[type === "sell" ? "sells" : "buys"] || [];
          const filled = sumFills(list);
          const pct = targetQty > 0 ? (filled.qty / targetQty) * 100 : 0;
          const full = filled.qty >= targetQty * 0.999;
          const overShares =
            type === "sell" && maxShares > 0 && filled.qty > maxShares + 0.01;
          const overDollars =
            type === "buy" &&
            maxDollars > 0 &&
            filled.proceeds > maxDollars + 0.01;
          return (
            <div>
              <table style={S.tbl}>
                <thead>
                  <tr>
                    <th style={S.th}>Price</th>
                    <th style={{ ...S.th, width: 14, padding: "6px 2px" }}></th>
                    <th style={S.th}>Shares</th>
                    <th style={S.thr}>Total</th>
                    <th style={{ ...S.th, width: 24 }}></th>
                  </tr>
                </thead>
                <tbody>
                  {list.map((f) => (
                    <FillRowComp
                      key={f.id}
                      fill={f}
                      onCommit={(p, q) =>
                        commitFillRow(acct, strat, type, f.id, p, q)
                      }
                      onRemove={() => rmFill(acct, strat, type, f.id)}
                    />
                  ))}
                </tbody>
              </table>
              <div style={{ padding: "4px 8px" }}>
                <button
                  style={S.btnSm}
                  onClick={() => addFill(acct, strat, type)}
                >
                  + Fill
                </button>
              </div>
              {filled.qty > 0 && (
                <div
                  style={{ fontSize: 10, color: "#8b949e", padding: "2px 8px" }}
                >
                  {full ? (
                    <span style={S.filledB}>✓ FILLED</span>
                  ) : (
                    <span style={S.partialB}>PARTIAL {pct.toFixed(0)}%</span>
                  )}{" "}
                  {fmtSh(filled.qty)} @ {fmt(filled.avg)} ={" "}
                  {fmt(filled.proceeds)}
                </div>
              )}
              {overShares && (
                <div style={S.errSm}>
                  ⚠ Filled {fmtSh(filled.qty)} shs exceeds portfolio holdings of{" "}
                  {fmtSh(maxShares)} shs
                </div>
              )}
              {overDollars && (
                <div style={S.errSm}>
                  ⚠ Filled {fmt(filled.proceeds)} exceeds buy budget of{" "}
                  {fmt(maxDollars)}
                </div>
              )}
            </div>
          );
        };

        const SellOrdersFills = ({
          acct,
          strategy,
          ticker,
          totalShares,
          limitPrice,
        }) => {
          const af = fills[acct] || {};
          const fillList = af[strategy]?.sells || [];
          const filled = sumFills(fillList);
          const remShares = Math.max(0, totalShares - filled.qty);
          const chunks = buildSellChunks(remShares, limitPrice, acct, strategy);
          const totalChunkShares = chunks.reduce((s, c) => s + c.shares, 0);
          const totalChunkCost = chunks.reduce((s, c) => s + c.cost, 0);
          return (
            <div
              style={{
                background: "#0d111722",
                border: "1px solid #21262d",
                borderRadius: 6,
                marginBottom: 8,
                overflow: "hidden",
              }}
            >
              <div style={{ display: "flex" }}>
                <div style={{ flex: 3, minWidth: 0 }}>
                  <div style={S.secH}>
                    {strategy} — Orders (
                    {chunks.length === 1
                      ? "1 order"
                      : `${chunks.length} orders`}
                    )
                  </div>
                  {remShares > 0.001 ? (
                    <table style={{ ...S.tbl, tableLayout: "fixed" }}>
                      <colgroup>
                        <col style={{ width: "30%" }} />
                        <col style={{ width: "20%" }} />
                        <col style={{ width: "17%" }} />
                        <col style={{ width: "17%" }} />
                        <col style={{ width: "16%" }} />
                      </colgroup>
                      <thead>
                        <tr>
                          <th style={S.th}>Strategy</th>
                          <th style={S.th}>Ticker</th>
                          <th style={S.thr}>Target Shs</th>
                          <th style={S.thr}>Limit Price</th>
                          <th style={S.thr}>Order Cost</th>
                        </tr>
                      </thead>
                      <tbody>
                        {chunks.map((ch, i) => (
                          <tr key={ch.idx}>
                            <td
                              style={{ ...S.td, fontWeight: 700, fontSize: 11 }}
                            >
                              {i === 0 ? strategy : ""}
                            </td>
                            <td style={{ ...S.td, fontWeight: 600 }}>
                              {i === 0 && (
                                <>
                                  <span style={S.sell}>SELL</span> {ticker}
                                </>
                              )}
                            </td>
                            <td style={{ ...S.tdr, fontWeight: 700 }}>
                              {fmtSh(ch.shares)}
                            </td>
                            <td style={S.tdr}>
                              <BI
                                style={{ ...S.inpSm, width: 65 }}
                                value={ch.limitPrice || ""}
                                placeholder="Limit"
                                onCommit={(v) =>
                                  setChkLim(acct, strategy, "sell", ch.idx, v)
                                }
                              />
                            </td>
                            <td style={S.tdr}>{fmt(ch.cost)}</td>
                          </tr>
                        ))}
                        {chunks.length > 1 && (
                          <tr style={{ background: "#1f6feb08" }}>
                            <td style={{ ...S.td, fontWeight: 600 }}>Total</td>
                            <td style={S.td} />
                            <td style={{ ...S.tdr, fontWeight: 700 }}>
                              {fmtSh(totalChunkShares)}
                            </td>
                            <td style={S.tdr} />
                            <td style={{ ...S.tdr, fontWeight: 600 }}>
                              {fmt(totalChunkCost)}
                            </td>
                          </tr>
                        )}
                      </tbody>
                    </table>
                  ) : (
                    <div
                      style={{ padding: "8px", fontSize: 11, color: "#3fb950" }}
                    >
                      ✓ All shares sold
                    </div>
                  )}
                </div>
                <div
                  style={{
                    flex: 2,
                    minWidth: 200,
                    borderLeft: "1px solid #30363d",
                  }}
                >
                  <div style={S.secH}>Fills</div>
                  <FillSection
                    acct={acct}
                    strat={strategy}
                    type="sell"
                    targetQty={totalShares}
                    maxShares={totalShares}
                    maxDollars={0}
                  />
                </div>
              </div>
            </div>
          );
        };

        const BuyOrdersFills = ({
          acct,
          strategy,
          ticker,
          totalDollars,
          limitPrice,
          remDollars,
          overAlloc,
        }) => {
          const chunks = buildBuyChunks(remDollars, limitPrice, acct, strategy);
          const totalChunkShares = chunks.reduce((s, c) => s + c.shares, 0);
          const totalChunkCost = chunks.reduce((s, c) => s + c.cost, 0);
          return (
            <div
              style={{
                background: overAlloc ? "#d2992210" : "#0d111722",
                border: "1px solid #21262d",
                borderRadius: 6,
                marginBottom: 8,
                overflow: "hidden",
              }}
            >
              <div style={{ display: "flex" }}>
                <div style={{ flex: 3, minWidth: 0 }}>
                  <div style={S.secH}>
                    {strategy} — Orders (
                    {chunks.length === 1
                      ? "1 order"
                      : `${chunks.length} orders`}
                    )
                  </div>
                  {remDollars > 0.01 ? (
                    <table style={{ ...S.tbl, tableLayout: "fixed" }}>
                      <colgroup>
                        <col style={{ width: "30%" }} />
                        <col style={{ width: "20%" }} />
                        <col style={{ width: "17%" }} />
                        <col style={{ width: "17%" }} />
                        <col style={{ width: "16%" }} />
                      </colgroup>
                      <thead>
                        <tr>
                          <th style={S.thr}>Strategy</th>
                          <th style={S.thr}>Ticker</th>
                          <th style={S.thr}>Target Shs</th>
                          <th style={S.thr}>Limit Price</th>
                          <th style={S.thr}>Order Cost</th>

        // ── CSV helpers ───────────────────────────────────────────────────────────
        const parseCSVLine = (line) => {
          const result = [];
          let cur = "";
          let inQ = false;
          for (let i = 0; i < line.length; i++) {
            const ch = line[i];
            if (ch === '"') {
              if (inQ && line[i + 1] === '"') {
                cur += '"';
                i++;
              } else inQ = !inQ;
            } else if (ch === "," && !inQ) {
              result.push(cur.trim());
              cur = "";
            } else cur += ch;
          }
          result.push(cur.trim());
          return result;
        };

        const applyImportedState = useCallback(
          (state) => {
            if (!state.schema_version || !state.inputs)
              throw new Error("Not a valid rebalancer state file.");
            const newParsed = {};
            (state.inputs.accounts || []).forEach((acct) => {
              const posMap = {};
              (acct.positions || []).forEach((p) => {
                posMap[p.symbol] = {
                  symbol: p.symbol,
                  quantity: p.quantity,
                  value: p.value,
                  price: p.price,
                };
              });
              if ((acct.cash_spaxx || 0) > 0)
                posMap["SPAXX**"] = {
                  symbol: "SPAXX**",
                  quantity: acct.cash_spaxx,
                  value: acct.cash_spaxx,
                  price: 1.0,
                };
              newParsed[acct.name] = {
                accountName: acct.name,
                positions: posMap,
                pendingActivity: acct.pending_activity || 0,
              };
            });
            const newSignals = { ...signals };
            const seen = new Set();
            (state.inputs.signals || []).forEach((sig) => {
              if (!seen.has(sig.strategy)) {
                seen.add(sig.strategy);
                newSignals[sig.strategy] = {
                  current: sig.current_ticker,
                  new: sig.new_ticker,
                };
              }
            });
            // Prefer the Python-sized chunk plan (state.computed) over the
            // calculator's own flat-$100K chunking. Build the per-chunk template
            // and seed the editable limit-price inputs from it.
            const impChunks = {};
            const impLimits = {};
            const ingest = (list, side) => {
              (list || []).forEach((c) => {
                if (!c || !c.account || !c.strategy) return;
                const key = side + ":" + c.strategy;
                ((impChunks[c.account] ||= {})[key] ||= []).push({
                  idx: c.idx,
                  shares: c.shares,
                  limitPrice: c.limit_price,
                  cost: c.cost,
                });
                ((impLimits[c.account] ||= {})[key] ||= {})[c.idx] =
                  c.limit_price;
              });
            };
            if (state.computed) {
              ingest(state.computed.sell_chunks, "sell");
              ingest(state.computed.buy_chunks, "buy");
            }
            Object.values(impChunks).forEach((byKey) =>
              Object.values(byKey).forEach((arr) =>
                arr.sort((a, b) => a.idx - b.idx),
              ),
            );
            const hasPlan = Object.keys(impChunks).length > 0;

            setImportedPositions(newParsed);
            setSignals(newSignals);
            if (state.inputs.prev_closes)
              setPrevCloses(state.inputs.prev_closes);
            setFills({});
            setChunkLimits(hasPlan ? impLimits : {});
            setImportedChunks(hasPlan ? impChunks : null);
            setEntryRound(0);
            setCalc(true);
            setTab("trades");
          },
          [signals],
        );

        useEffect(() => {
          fetch("fidelity_rebalancer/accounts.json")
            .then((r) => (r.ok ? r.json() : Promise.reject(r.status)))
            .then((data) => {
              ACCOUNTS_CONFIG = data;
              ALL_STRATS = [
                ...new Set(
                  Object.values(data).flatMap((cfg) =>
                    Object.keys(cfg.strategies || {}),

                ),

              const labels = {};
              Object.entries(data).forEach(([name, cfg]) => {
                if (cfg.csvSlot) labels[cfg.csvSlot] = name;

              ACCOUNTS_CSV_LABELS = labels;
              setSignals((prev) => {
                if (Object.keys(prev).length > 0) return prev;
                const init = {};
                ALL_STRATS.forEach((s) => {
                  init[s] = { current: "", new: "" };
                });
                return init;
              });
              setConfigLoaded(true);
            })
            .catch(() => setConfigLoaded(true));
        }, []);

        useEffect(() => {
          const params = new URLSearchParams(window.location.search);
          const importPath = params.get("import");
          if (!importPath) return;
          // Refuse anything that could resolve off-origin (absolute URLs, protocol-relative,
          // or backslash paths). Only same-origin relative paths are allowed.
          if (
            importPath.includes("://") ||
            importPath.startsWith("//") ||
            importPath.startsWith("\\")
          ) {
            setAutoImportBanner(
              "Auto-import refused: only same-origin relative paths are allowed.",
            );
            return;
          }
          fetch(importPath)
            .then((res) => {
              if (!res.ok)
                throw new Error(`HTTP ${res.status} fetching ${importPath}`);
              return res.json();
            })
            .then((state) => {
              applyImportedState(state);
              history.replaceState(null, "", window.location.pathname);
            })
            .catch((err) => {
              setAutoImportBanner(
                `Auto-import failed: ${err.message}. Use ⬆ Import State manually.`,
              );
            });
        }, []);

              applyImportedState(state);

              alert("Failed to import state: " + err.message);

            e.target.value = "";
          };
          reader.readAsText(file);
        };

        const exportState = () => {

            .filter(([n]) => parsed[n])

              return {

          const signalInputs = [];

          const cashOk = {};

          const sellChunks = [];
          const buyChunks = [];
          let sc = 0;
          let bc = 0;

          Object.entries(ACCOUNTS_CONFIG).forEach(([acct, cfg]) => {
            if (!parsed[acct] || !results[acct]) return;
            const res = results[acct];
            cashOk[acct] = res.cashOk;
            oneShareTotal[acct] = Object.keys(cfg.strategies).reduce(
              (s, strat) => {
                return (
                  s +

                    res.sPos[strat]?.price ||

              },

            res.sells.forEach((sell) => {
              sells.push({
                account: acct,

                shares: sell.quantity,
                limit_price: sell.limitPrice,

              buildSellChunks(
                sell.quantity,

                sc++;
                sellChunks.push({
                  chunk_id: `s${sc}`,

              });

            res.buys.forEach((buy) => {
              buyAllocations.push({
                account: acct,
                strategy: buy.strategy,
                ticker: buy.ticker,
                dollar_target: buy.dollarTarget,
                limit_price: buy.limitPrice,
                share_target: buy.shares,

              });
              buildBuyChunks(
                buy.dollarTarget,
                buy.limitPrice,
                acct,
                buy.strategy,
              ).forEach((ch) => {
                bc++;
                buyChunks.push({
                  chunk_id: `b${bc}`,
                  account: acct,
                  strategy: buy.strategy,
                  ticker: buy.ticker,
                  idx: ch.idx,
                  shares: ch.shares,
                  limit_price: ch.limitPrice,
                  cost: ch.cost,
                });
              });
            });
          });

          const state = {
            schema_version: "1.0",
            generated_at: ts.toISOString(),
            generator: "react_calc",
            inputs: {
              accounts: accountInputs,
              signals: signalInputs,
              prev_closes: { ...closes },
              config: {
                ex_div_check: true,
                polling_seconds: 45,
                stall_threshold_seconds: 300,
                chunker: {
                  max_pct_of_top3_depth: 0.25,
                  max_pct_of_5min_volume: 0.15,
                },
              },
            },
            computed: {
              cash_ok: cashOk,
              one_share_total: oneShareTotal,
              sells,
              buy_allocations: buyAllocations,
              sell_chunks: sellChunks,
              buy_chunks: buyChunks,
              drift: {},
            },
          };

          const blob = new Blob([JSON.stringify(state, null, 2)], {
            type: "application/json",
          });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = filename;
          a.click();
          URL.revokeObjectURL(url);
        };

        const exportTrades = () => {
          if (!calculated) return;
          const af0 = fills;
          const rows = [
            [
              "Account",
              "Side",
              "Strategy",
              "Ticker",
              "ChunkIndex",
              "TargetShares",
              "LimitPrice",
              "EstOrderCost",
              "DollarBudget",
            ],
          ];
          Object.entries(results).forEach(([acct, res]) => {
            const af = af0[acct] || {};
            const eff = getEff(acct);
            res.sells.forEach((sell) => {
              const sf = af[sell.strategy]?.sells || [];
              const filled = sumFills(sf);
              const remShs = Math.max(0, sell.quantity - filled.qty);
              const chunks = buildSellChunks(
                remShs,
                sell.limitPrice,
                acct,
                sell.strategy,
              );
              chunks.forEach((ch, i) => {
                rows.push([
                  acct,
                  "SELL",
                  sell.strategy,
                  sell.ticker,
                  i + 1,
                  ch.shares.toFixed(3),
                  ch.limitPrice.toFixed(4),
                  ch.cost.toFixed(2),
                  "",
                ]);
              });
            });
            eff.buys.forEach((buy) => {
              const bf = af[buy.strategy]?.buys || [];
              const filled = sumFills(bf);
              const remD = buy.dollarTarget - filled.proceeds;
              const chunks = buildBuyChunks(
                remD,
                buy.limitPrice,
                acct,
                buy.strategy,
              );
              chunks.forEach((ch, i) => {
                rows.push([
                  acct,
                  "BUY",
                  buy.strategy,
                  buy.ticker,
                  i + 1,
                  ch.shares,
                  ch.limitPrice.toFixed(4),
                  ch.cost.toFixed(2),
                  buy.dollarTarget.toFixed(2),
                ]);
              });
            });
          });
          const csv = rows
            .map((r) =>
              r.map((v) => `"${String(v).replace(/"/g, '""')}"`).join(","),
            )
            .join("\n");
          const blob = new Blob([csv], { type: "text/csv" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = `rebalance_orders_${new Date().toISOString().slice(0, 10)}.csv`;
          a.click();
          URL.revokeObjectURL(url);
        };

        const importFills = (e) => {
          const file = e.target.files[0];

          const reader = new FileReader();
          reader.onload = (ev) => {
            const lines = ev.target.result
              .split(/\r?\n/)
              .filter((l) => l.trim());
            if (lines.length < 2) return;
            const hdr = parseCSVLine(lines[0]);
            const col = (n) => hdr.indexOf(n);
            const newFills = JSON.parse(JSON.stringify(fills));
            lines.slice(1).forEach((line) => {
              const vals = parseCSVLine(line);
              const get = (n) =>
                (vals[col(n)] || "").replace(/^"|"$/g, "").trim();
              const acct = get("Account");
              const side = get("Side");
              const strategy = get("Strategy");
              const price = parseFloat(get("FillPrice")) || 0;
              const qty = parseFloat(get("FillShares")) || 0;
              if (!acct || !strategy || !side || price <= 0 || qty <= 0) return;
              if (!newFills[acct]) newFills[acct] = {};
              if (!newFills[acct][strategy])
                newFills[acct][strategy] = { sells: [], buys: [] };
              const type = side === "SELL" ? "sells" : "buys";
              newFills[acct][strategy][type].push({
                id: Date.now() + Math.random(),
                price,
                qty,
              });
            });
            setFills(newFills);
            e.target.value = "";
          };
          reader.readAsText(file);
        };

        const fetchCloses = async () => {

        const renderSetup = () => (

                    <textarea

        const renderTrades = () => {

                <div style={S.row}>

                    <div style={S.met}>
                      <span style={S.mL}>Signals</span>
                      <span style={{ ...S.mV, color: "#f85149" }}>

                      </span>
                    </div>
                  </div>
                  <div style={S.col}>
                    {Object.entries(results).map(([n, r]) => (

              {Object.entries(results).map(([acct, res]) => {

                const af = fills[acct] || {};
                const eff = getEff(acct);
                let totBuyFilled = 0;
                eff.buys.forEach((b) => {
                  totBuyFilled += b.filledProceeds;

                let sellFunds = 0;
                res.sells.forEach((sell) => {
                  const sf = af[sell.strategy]?.sells || [];

                const overBudget = totBuyFilled > budget + 0.01;

                return (
                  <div key={acct} style={S.card}>
                    <div

                        display: "flex",

                        {isTOD && (

                              color: "#f85149",

                            MARGIN

                        {eff.isLive && (
                          <span
                            style={{
                              ...S.tag,
                              background: "#d2992222",

                      </div>
                      <div style={{ fontSize: 11, color: "#8b949e" }}>

                          <> | Pending: {fmt(parsed[acct].pendingActivity)}</>

                    </div>
                    {overBudget && (
                      <div style={S.err}>
                        ⚠ BUY FILLS ({fmt(totBuyFilled)}) EXCEED BUDGET (
                        {fmt(budget)})

                    {res.sells.length > 0 && (
                      <>
                        <div style={S.ph(true)}>
                          <span
                            style={{
                              width: 8,
                              height: 8,
                              borderRadius: "50%",
                              background: "#f85149",
                              display: "inline-block",

                          <span
                            style={{
                              fontSize: 12,
                              fontWeight: 600,
                              color: "#f85149",
                            }}
                          >
                            {isTOD ? "SELLS" : "PHASE 1: SELLS"}
                          </span>
                        </div>
                        <table style={S.tbl}>
                          <thead>
                            <tr>
                              <th style={S.th}>Strategy</th>
                              <th style={S.th}>Ticker</th>
                              <th style={S.thr}>$ Filled</th>
                              <th style={S.thr}>Avg Cost</th>
                              <th style={S.thr}>Total Shs</th>
                              <th style={S.thr}>Remaining Shs</th>
                            </tr>
                          </thead>
                          <tbody>
                            {res.sells.map((sell) => {
                              const sf = af[sell.strategy]?.sells || [];
                              const filled = sumFills(sf);
                              const remSh = Math.max(

                              return (
                                <tr key={sell.strategy}>
                                  <td
                                    style={{
                                      ...S.td,
                                      fontWeight: 700,
                                      fontSize: 11,

                                  >
                                    {sell.strategy}
                                  </td>
                                  <td style={{ ...S.td, fontWeight: 600 }}>
                                    <span style={S.sell}>SELL</span>{" "}
                                    {sell.ticker}
                                  </td>
                                  <td
                                    style={{
                                      ...S.tdr,
                                      color:
                                        filled.proceeds > 0
                                          ? "#c9d1d9"
                                          : "#484f58",
                                      fontWeight: 600,
                                    }}
                                  >
                                    {filled.proceeds > 0
                                      ? fmt(filled.proceeds)
                                      : "—"}
                                  </td>
                                  <td
                                    style={{
                                      ...S.tdr,
                                      color:
                                        filled.qty > 0 ? "#c9d1d9" : "#484f58",
                                    }}
                                  >
                                    {filled.qty > 0 ? fmt(filled.avg) : "—"}
                                  </td>
                                  <td
                                    style={{
                                      ...S.tdr,
                                      color:
                                        filled.qty > 0 ? "#c9d1d9" : "#484f58",
                                    }}
                                  >
                                    {filled.qty > 0 ? fmtSh(filled.qty) : "—"}
                                  </td>
                                  <td
                                    style={{
                                      ...S.tdr,
                                      fontWeight: 700,
                                      fontSize: 13,
                                      color:
                                        remSh > 0.01 ? "#d29922" : "#3fb950",

                                  >
                                    {fmtSh(remSh)}{" "}
                                    <span
                                      style={{
                                        fontSize: 10,
                                        fontWeight: 400,
                                        color: "#8b949e",
                                      }}
                                    >
                                      of {fmtSh(sell.quantity)}
                                    </span>
                                  </td>
                                </tr>
                              );
                            })}
                          </tbody>
                        </table>
                        {res.sells.map((sell) => (
                          <SellOrdersFills
                            key={sell.strategy}
                            acct={acct}
                            strategy={sell.strategy}
                            ticker={sell.ticker}
                            totalShares={sell.quantity}
                            limitPrice={sell.limitPrice}

                      </>
                    )}

                    {eff.buys.length > 0 && (
                      <div style={{ marginTop: 10 }}>
                        <div
                          style={{
                            ...S.ph(true),
                            justifyContent: "space-between",

                          <div
                            style={{
                              display: "flex",
                              alignItems: "center",
                              gap: 8,
                            }}
                          >
                            <span
                              style={{
                                width: 8,
                                height: 8,
                                borderRadius: "50%",
                                background: "#3fb950",
                                display: "inline-block",
                              }}
                            />
                            <span
                              style={{
                                fontSize: 12,
                                fontWeight: 600,
                                color: "#3fb950",
                              }}
                            >
                              {isTOD ? "BUYS" : "PHASE 2: BUYS"}
                            </span>
                            {eff.isLive && (
                              <span style={{ fontSize: 10, color: "#d29922" }}>
                                Live recalc
                              </span>
