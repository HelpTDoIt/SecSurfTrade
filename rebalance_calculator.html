                          </div>
                          <div style={S.sumBar}>
                            <span style={{ color: "#8b949e" }}>
                              Est. Sells{" "}
                              <span style={{ color: "#c9d1d9" }}>
                                {fmt(res.estSell)}
                              </span>
                            </span>
                            {sellFunds > 0 && (
                              <span style={{ color: "#8b949e" }}>
                                Funds{" "}
                                <span style={{ color: "#d29922" }}>
                                  {fmt(sellFunds)}
                                </span>
                              </span>
                            )}
                            <span style={{ color: "#8b949e" }}>
                              Budget{" "}
                              <span style={{ color: "#58a6ff" }}>
                                {fmt(budget)}
                              </span>
                            </span>
                            {totBuyFilled > 0 && (
                              <span style={{ color: "#8b949e" }}>
                                Bought{" "}
                                <span style={{ color: "#3fb950" }}>
                                  {fmt(totBuyFilled)}
                                </span>
                              </span>
                            )}
                            <span style={{ color: "#8b949e" }}>
                              Unused{" "}
                              <span
                                style={{
                                  color:
                                    budget - totBuyFilled > 1
                                      ? "#d29922"
                                      : "#3fb950",
                                }}
                              >
                                {fmt(budget - totBuyFilled)}
                              </span>
                            </span>
                          </div>
                        </div>
                        <table style={S.tbl}>
                          <thead>
                            <tr>
                              <th style={S.th}>Strategy</th>
                              <th style={S.th}>Ticker</th>
                              <th style={S.thr}>$ Filled</th>
                              <th style={S.thr}>Avg Cost</th>
                              <th style={S.thr}>Total Shs</th>
                              <th style={S.thr}>Remaining Balance</th>
                            </tr>
                          </thead>
                          <tbody>
                            {eff.buys.map((buy) => {
                              const tgtPct =
                                ACCOUNTS_CONFIG[acct].strategies[buy.strategy];
                              const allocPct =
                                res.totalPool > 0 && buy.filledProceeds > 0
                                  ? buy.filledProceeds / res.totalPool
                                  : 0;
                              const overAlloc =
                                buy.filledProceeds > 0 &&
                                allocPct > tgtPct + 0.02;
                              return (
                                <tr key={buy.strategy}>
                                  <td
                                    style={{
                                      ...S.td,
                                      fontWeight: 700,
                                      fontSize: 11,
                                    }}
                                  >
                                    {buy.strategy}
                                    {buy.isRebalance && (
                                      <span
                                        style={{
                                          ...S.tag,
                                          background: "#1f6feb22",
                                          color: "#58a6ff",
                                        }}
                                      >
                                        REBAL
                                      </span>
                                    )}
                                    {overAlloc && (
                                      <span
                                        style={{
                                          ...S.tag,
                                          background: "#d2992233",
                                          color: "#d29922",
                                        }}
                                      >
                                        OVER
                                      </span>
                                    )}
                                  </td>
                                  <td style={{ ...S.td, fontWeight: 600 }}>
                                    <span style={S.buy}>BUY</span> {buy.ticker}
                                  </td>
                                  <td
                                    style={{
                                      ...S.tdr,
                                      color:
                                        buy.filledProceeds > 0
                                          ? "#3fb950"
                                          : "#484f58",
                                      fontWeight: 600,
                                    }}
                                  >
                                    {buy.filledProceeds > 0
                                      ? fmt(buy.filledProceeds)
                                      : "—"}
                                  </td>
                                  <td
                                    style={{
                                      ...S.tdr,
                                      color:
                                        buy.filledQty > 0
                                          ? "#3fb950"
                                          : "#484f58",
                                    }}
                                  >
                                    {buy.filledQty > 0
                                      ? fmt(buy.filledAvg)
                                      : "—"}
                                  </td>
                                  <td
                                    style={{
                                      ...S.tdr,
                                      color:
                                        buy.filledQty > 0
                                          ? "#3fb950"
                                          : "#484f58",
                                    }}
                                  >
                                    {buy.filledQty > 0
                                      ? fmtSh(buy.filledQty)
                                      : "—"}
                                  </td>
                                  <td
                                    style={{
                                      ...S.tdr,
                                      fontWeight: 700,
                                      fontSize: 13,
                                      color:
                                        buy.remDollars < -0.01
                                          ? "#f85149"
                                          : buy.remDollars > 0.01
                                            ? "#d29922"
                                            : "#3fb950",
                                    }}
                                  >
                                    {fmt(buy.remDollars)}{" "}
                                    <span
                                      style={{
                                        fontSize: 10,
                                        fontWeight: 400,
                                        color: "#8b949e",
                                      }}
                                    >
                                      of {fmt(buy.dollarTarget)}
                                    </span>
                                  </td>
                                </tr>
                              );
                            })}
                          </tbody>
                        </table>
                        {eff.buys.map((buy) => {
                          const tgtPct =
                            ACCOUNTS_CONFIG[acct].strategies[buy.strategy];
                          const allocPct =
                            res.totalPool > 0 && buy.filledProceeds > 0
                              ? buy.filledProceeds / res.totalPool
                              : 0;
                          const overAlloc =
                            buy.filledProceeds > 0 && allocPct > tgtPct + 0.02;
                          return (
                            <BuyOrdersFills
                              key={buy.strategy}
                              acct={acct}
                              strategy={buy.strategy}
                              ticker={buy.ticker}
                              totalDollars={buy.dollarTarget}
                              limitPrice={buy.limitPrice}
                              remDollars={buy.remDollars}
                              overAlloc={overAlloc}
                            />
                          );
                        })}
                      </div>
                    )}

                    {res.sells.length === 0 && eff.buys.length === 0 && (
                      <div style={S.info}>No trades this month.</div>
                    )}
                  </div>
                );
              })}
              <div
                style={{
                  display: "flex",
                  gap: 12,
                  justifyContent: "center",
                  marginTop: 16,
                }}
              >
                <button style={S.btn2} onClick={() => setTab("setup")}>
                  ← Setup
                </button>
                <button style={S.btn} onClick={() => setTab("allocation")}>
                  Allocation →
                </button>
              </div>
            </div>
          );
        };

        const renderAlloc = () => {
          if (!calculated)
            return <div style={S.card}>Run calculation first.</div>;
          return (
            <div>
              {Object.entries(ACCOUNTS_CONFIG).map(([acct, cfg]) => {
                const p = parsed[acct];
                const res = results[acct];
                if (!p || !res) return null;
                const sN = Object.keys(cfg.strategies);
                const af = fills[acct] || {};
                const eff = getEff(acct);
                let actSell = 0;
                res.sells.forEach((sell) => {
                  const sf = af[sell.strategy]?.sells || [];
                  actSell += hasRealFills(sf)
                    ? sumFills(sf).proceeds
                    : sell.estProceeds;
                });
                let totBuyFill = 0;
                eff.buys.forEach((b) => {
                  totBuyFill += b.filledProceeds;
                });
                const hasAct =
                  res.sells.some((sell) =>
                    hasRealFills(af[sell.strategy]?.sells || []),
                  ) || totBuyFill > 0;
                const actCash = res.deplCash + actSell - totBuyFill;
                return (
                  <div key={acct} style={S.card}>
                    <div style={S.cT}>{acct}</div>
                    <table style={S.tbl}>
                      <thead>
                        <tr>
                          <th style={S.th}>Strategy</th>
                          <th style={S.th}>Target %</th>
                          <th style={S.thr}>Pre-Trade $</th>
                          <th style={S.thr}>Pre %</th>
                          <th style={S.thr}>Drift</th>
                          <th style={S.thr}>Rec $</th>
                          <th style={S.thr}>Rec %</th>
                          <th style={S.thr}>Actual $</th>
                          <th style={S.thr}>Actual %</th>
                          <th style={S.thr}>Drift</th>
                          <th style={S.th}>ETF</th>
                        </tr>
                      </thead>
                      <tbody>
                        {sN.map((s) => {
                          const tP = cfg.strategies[s];
                          const cV = res.sPos[s]?.value || 0;
                          const cP = res.totalPool > 0 ? cV / res.totalPool : 0;
                          const pD = cP - tP;
                          const isTr =
                            signals[s]?.new &&
                            signals[s].new !== signals[s].current;
                          const bA = eff.buys.find((b) => b.strategy === s);
                          let rV = cV;
                          if (isTr) rV = bA ? bA.estCost : 0;
                          else if (bA) rV = cV + bA.estCost;
                          const rP = res.totalPool > 0 ? rV / res.totalPool : 0;
                          const sF = sumFills(af[s]?.sells || []);
                          const bF = sumFills(af[s]?.buys || []);
                          let aV;
                          if (isTr) {
                            if (!hasRealFills(af[s]?.sells || []))
                              aV = bA ? bA.estCost : 0;
                            else if (
                              sF.qty >=
                              (res.sPos[s]?.quantity || 0) * 0.999
                            )
                              aV = bF.proceeds;
                            else {
                              const rem = Math.max(
                                0,
                                (res.sPos[s]?.quantity || 0) - sF.qty,
                              );
                              aV =
                                rem *
                                  (res.sells.find((x) => x.strategy === s)
                                    ?.limitPrice ||
                                    res.sPos[s]?.price ||
                                    0) +
                                bF.proceeds;
                            }
                          } else aV = cV + bF.proceeds;
                          const aP = res.totalPool > 0 ? aV / res.totalPool : 0;
                          const aD = aP - tP;
                          const postETF = isTr
                            ? signals[s]?.new || ""
                            : signals[s]?.current || "";
                          return (
                            <tr key={s}>
                              <td
                                style={{
                                  ...S.td,
                                  fontWeight: 700,
                                  fontSize: 11,
                                }}
                              >
                                {s}
                                {isTr && (
                                  <span
                                    style={{
                                      ...S.tag,
                                      background: "#f8514922",
                                      color: "#f85149",
                                    }}
                                  >
                                    {signals[s].current}→{signals[s].new}
                                  </span>
                                )}
                              </td>
                              <td style={S.td}>{fmtPct(tP)}</td>
                              <td style={S.tdr}>{fmt(cV)}</td>
                              <td style={S.tdr}>{fmtPct(cP)}</td>
                              <td
                                style={{
                                  ...S.tdr,
                                  color:
                                    Math.abs(pD) > 0.02 ? "#f85149" : "#3fb950",
                                }}
                              >
                                {pD > 0 ? "+" : ""}
                                {fmtPct(pD)}
                              </td>
                              <td style={S.tdr}>{fmt(rV)}</td>
                              <td style={S.tdr}>{fmtPct(rP)}</td>
                              <td
                                style={{
                                  ...S.tdr,
                                  color: hasAct ? "#58a6ff" : "#484f58",
                                  fontWeight: 700,
                                }}
                              >
                                {hasAct ? fmt(aV) : "—"}
                              </td>
                              <td
                                style={{
                                  ...S.tdr,
                                  color: hasAct ? "#58a6ff" : "#484f58",
                                  fontWeight: 700,
                                }}
                              >
                                {hasAct ? fmtPct(aP) : "—"}
                              </td>
                              <td
                                style={{
                                  ...S.tdr,
                                  color: !hasAct
                                    ? "#484f58"
                                    : Math.abs(aD) > 0.02
                                      ? "#f85149"
                                      : "#3fb950",
                                  fontWeight: 700,
                                }}
                              >
                                {hasAct
                                  ? `${aD > 0 ? "+" : ""}${fmtPct(aD)}`
                                  : "—"}
                              </td>
                              <td
                                style={{
                                  ...S.td,
                                  fontWeight: 700,
                                  color: "#58a6ff",
                                }}
                              >
                                {postETF}
                              </td>
                            </tr>
                          );
                        })}
                        <tr>
                          <td style={{ ...S.td, fontWeight: 700 }}>Cash</td>
                          <td style={S.td}>0%</td>
                          <td style={S.tdr}>{fmt(res.deplCash)}</td>
                          <td style={S.tdr}>
                            {fmtPct(res.deplCash / res.totalPool)}
                          </td>
                          <td style={S.tdr} />
                          <td style={S.tdr}>
                            {fmt(
                              Math.max(
                                0,
                                res.estSell +
                                  res.deplCash -
                                  eff.buys.reduce((s, b) => s + b.estCost, 0),
                              ),
                            )}
                          </td>
                          <td style={S.tdr} />
                          <td
                            style={{
                              ...S.tdr,
                              color: hasAct ? "#58a6ff" : "#484f58",
                              fontWeight: 700,
                            }}
                          >
                            {hasAct ? fmt(Math.max(0, actCash)) : "—"}
                          </td>
                          <td
                            style={{
                              ...S.tdr,
                              color: hasAct ? "#58a6ff" : "#484f58",
                              fontWeight: 700,
                            }}
                          >
                            {hasAct
                              ? fmtPct(Math.max(0, actCash) / res.totalPool)
                              : "—"}
                          </td>
                          <td style={S.tdr} />
                          <td
                            style={{
                              ...S.td,
                              fontWeight: 700,
                              color: "#58a6ff",
                            }}
                          >
                            SPAXX
                          </td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                );
              })}
              <div
                style={{
                  display: "flex",
                  gap: 12,
                  justifyContent: "center",
                  marginTop: 16,
                }}
              >
                <button style={S.btn2} onClick={() => setTab("trades")}>
                  ← Trades
                </button>
              </div>
            </div>
          );
        };

        const renderEntry = () => {
          if (!calculated || !Object.keys(results).length) {
            return <div style={S.card}>Run calculation from Setup first.</div>;
          }

          // ── collect unfilled chunks, sells first then buys ──────────────────────
          const allSellItems = [];
          const allBuyItems = [];

          Object.keys(ACCOUNTS_CONFIG).forEach((acct) => {
            if (!results[acct]) return;
            const res = results[acct];
            const af = fills[acct] || {};

            res.sells.forEach((sell) => {
              const filled = sumFills(af[sell.strategy]?.sells || []);
              const remShares = Math.max(0, sell.quantity - filled.qty);
              if (remShares < 0.001) return;
              buildSellChunks(
                remShares,
                sell.limitPrice,
                acct,
                sell.strategy,
              ).forEach((ch) => {
                allSellItems.push({
                  acct,
                  strategy: sell.strategy,
                  ticker: sell.ticker,
                  ...ch,
                });
              });
            });

            getEff(acct).buys.forEach((buy) => {
              if (buy.remDollars < 0.01) return;
              buildBuyChunks(
                buy.remDollars,
                buy.limitPrice,
                acct,
                buy.strategy,
              ).forEach((ch) => {
                allBuyItems.push({
                  acct,
                  strategy: buy.strategy,
                  ticker: buy.ticker,
                  ...ch,
                });
              });
            });
          });

          // ── group by side + chunk index to form rounds ───────────────────────────
          const rounds = [];
          const maxSellIdx = allSellItems.reduce(
            (m, x) => Math.max(m, x.idx),
            -1,
          );
          for (let i = 0; i <= maxSellIdx; i++) {
            const items = allSellItems.filter((x) => x.idx === i);
            if (items.length) rounds.push({ type: "sell", idx: i, items });
          }
          const maxBuyIdx = allBuyItems.reduce(
            (m, x) => Math.max(m, x.idx),
            -1,
          );
          for (let i = 0; i <= maxBuyIdx; i++) {
            const items = allBuyItems.filter((x) => x.idx === i);
            if (items.length) rounds.push({ type: "buy", idx: i, items });
          }

          if (!rounds.length) {
            return (
              <div style={S.card}>
                <div style={S.info}>
                  No trades this month — nothing to enter.
                </div>
              </div>
            );
          }

          const ri = Math.min(entryRound, rounds.length - 1);
          const cur = rounds[ri];
          const isSell = cur.type === "sell";
          const accent = isSell ? "#f85149" : "#3fb950";
          const roundEst = cur.items.reduce((s, x) => s + x.cost, 0);
          const roundShares = cur.items.reduce((s, x) => s + x.shares, 0);

          // ── IRA cash advisory shown on every buy round ────────────────────────────
          const iraRows = !isSell
            ? Object.entries(results)
                .filter(([a]) => ACCOUNTS_CONFIG[a]?.type === "retirement")
                .map(([acct, res]) => {
                  const af = fills[acct] || {};
                  let sellFunds = 0;
                  let expectedSell = 0;
                  res.sells.forEach((s) => {
                    sellFunds += sumFills(af[s.strategy]?.sells || []).proceeds;
                    expectedSell += s.estProceeds;
                  });
                  const avail = res.deplCash + sellFunds;
                  const estBuy = (
                    liveBuys[acct]?.buys ||
                    res.buys ||
                    []
                  ).reduce((s, b) => s + b.estCost, 0);
                  return {
                    acct,
                    sellFunds,
                    expectedSell,
                    avail,
                    estBuy,
                    ok: avail >= estBuy - 0.01,
                  };
                })
            : [];

          return (
            <div>
              {/* ── round navigation ── */}
              <div style={S.card}>
                <div
                  style={{
                    display: "flex",
                    alignItems: "center",
                    gap: 12,
                    marginBottom: 10,
                  }}
                >
                  <button
                    style={S.btn2}
                    onClick={() => setEntryRound((r) => Math.max(0, r - 1))}
                    disabled={ri === 0}
                  >
                    ← Prev
                  </button>
                  <div style={{ flex: 1, textAlign: "center" }}>
                    <div
                      style={{ fontSize: 18, fontWeight: 700, color: accent }}
                    >
                      {isSell ? "SELL" : "BUY"} ROUND {cur.idx + 1}
                    </div>
                    <div
                      style={{ fontSize: 11, color: "#8b949e", marginTop: 2 }}
                    >
                      Step {ri + 1} of {rounds.length}
                    </div>
                  </div>
                  <button
                    style={S.btn2}
                    onClick={() =>
                      setEntryRound((r) => Math.min(rounds.length - 1, r + 1))
                    }
                    disabled={ri === rounds.length - 1}
                  >
                    Next →
                  </button>
                </div>
                {/* progress dots */}
                <div
                  style={{
                    display: "flex",
                    gap: 6,
                    justifyContent: "center",
                    marginBottom: 8,
                  }}
                >
                  {rounds.map((r, i) => (
                    <button
                      key={i}
                      onClick={() => setEntryRound(i)}
                      title={`${r.type === "sell" ? "Sell" : "Buy"} round ${r.idx + 1}`}
                      style={{
                        width: 24,
                        height: 8,
                        borderRadius: 4,
                        border: "none",
                        cursor: "pointer",
                        padding: 0,
                        background:
                          i === ri
                            ? r.type === "sell"
                              ? "#f85149"
                              : "#3fb950"
                            : "#30363d",
                      }}
                    />
                  ))}
                </div>
                <div
                  style={{
                    textAlign: "center",
                    fontSize: 11,
                    color: "#8b949e",
                  }}
                >
                  {isSell
                    ? "Shares are fixed — adjust limit price if needed, then enter in ATP."
                    : "Dollar target is fixed — set your limit price; shares auto-calculate."}
                </div>
              </div>

              {/* ── IRA cash advisory ── */}
              {iraRows.map(
                ({ acct, sellFunds, expectedSell, avail, estBuy, ok }) => (
                  <div
                    key={acct}
                    style={{ ...(ok ? S.info : S.err), marginBottom: 8 }}
                  >
                    <strong>{acct}</strong>
                    {expectedSell > 0 && (
                      <span style={{ color: "#f85149" }}>
                        {" "}
                        — sell proceeds logged {fmt(sellFunds)} of ~
                        {fmt(expectedSell)} expected
                      </span>
                    )}
                    <div style={{ marginTop: 2 }}>
                      available {fmt(avail)} vs. est. buys {fmt(estBuy)}
                      {ok
                        ? " — ✓ OK to proceed"
                        : " — ⚠ sell proceeds may not yet be settled (advisory)"}
                    </div>
                  </div>
                ),
              )}

              {/* ── orders table ── */}
              <div style={S.card}>
                <div
                  style={{
                    display: "flex",
                    justifyContent: "space-between",
                    alignItems: "center",
                    marginBottom: 10,
                  }}
                >
                  <div style={S.cT}>
                    {isSell ? "📤 Sell Orders" : "📥 Buy Orders"} — Enter in ATP
                  </div>
                  <div
                    style={{
                      fontSize: 11,
                      color: "#8b949e",
                      fontVariantNumeric: "tabular-nums",
                    }}
                  >
                    {cur.items.length} order{cur.items.length !== 1 ? "s" : ""}{" "}
                    · Est. {fmt(roundEst)}
                  </div>
                </div>

                {isSell ? (
                  <table style={S.tbl}>
                    <thead>
                      <tr>
                        <th style={S.th}>Account</th>
                        <th style={S.th}>Strategy</th>
                        <th style={S.th}>Ticker</th>
                        <th style={S.thr}>Shares</th>
                        <th style={S.thr}>Limit Price</th>
                        <th style={S.thr}>Est. Proceeds</th>
                      </tr>
                    </thead>
                    <tbody>
                      {cur.items.map((item) => (
                        <tr key={`${item.acct}-${item.strategy}`}>
                          <td
                            style={{ ...S.td, fontSize: 11, color: "#8b949e" }}
                          >
                            {item.acct}
                          </td>
                          <td
                            style={{ ...S.td, fontWeight: 700, fontSize: 11 }}
                          >
                            {item.strategy}
                          </td>
                          <td style={S.td}>
                            <span style={S.sell}>SELL</span>{" "}
                            <b>{item.ticker}</b>
                          </td>
                          <td
                            style={{ ...S.tdr, fontWeight: 700, fontSize: 14 }}
                          >
                            {fmtSh(item.shares)}
                          </td>
                          <td style={S.tdr}>
                            <BI
                              value={item.limitPrice}
                              placeholder="Limit"
                              onCommit={(v) =>
                                setChkLim(
                                  item.acct,
                                  item.strategy,
                                  "sell",
                                  item.idx,
                                  v,
                                )
                              }
                            />
                          </td>
                          <td style={{ ...S.tdr, fontWeight: 600 }}>
                            {item.limitPrice > 0 ? fmt(item.cost) : "—"}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                    <tfoot>
                      <tr
                        style={{
                          background: "#1f6feb08",
                          borderTop: "1px solid #30363d",
                        }}
                      >
                        <td
                          colSpan={3}
                          style={{
                            ...S.td,
                            fontWeight: 700,
                            color: "#8b949e",
                            fontSize: 11,
                          }}
                        >
                          ROUND TOTAL
                        </td>
                        <td style={{ ...S.tdr, fontWeight: 700 }}>
                          {fmtSh(roundShares)}
                        </td>
                        <td style={S.tdr} />
                        <td
                          style={{ ...S.tdr, fontWeight: 700, color: accent }}
                        >
                          {fmt(roundEst)}
                        </td>
                      </tr>
                    </tfoot>
                  </table>
                ) : (
                  <table style={S.tbl}>
                    <thead>
                      <tr>
                        <th style={S.th}>Account</th>
                        <th style={S.th}>Strategy</th>
                        <th style={S.th}>Ticker</th>
                        <th style={S.thr}>Limit Price</th>
                        <th style={S.thr}>Shares</th>
                        <th style={S.thr}>Est. Cost</th>
                      </tr>
                    </thead>
                    <tbody>
                      {cur.items.map((item) => (
                        <tr key={`${item.acct}-${item.strategy}`}>
                          <td
                            style={{ ...S.td, fontSize: 11, color: "#8b949e" }}
                          >
                            {item.acct}
                          </td>
                          <td
                            style={{ ...S.td, fontWeight: 700, fontSize: 11 }}
                          >
                            {item.strategy}
                          </td>
                          <td style={S.td}>
                            <span style={S.buy}>BUY</span> <b>{item.ticker}</b>
                          </td>
                          <td style={S.tdr}>
                            <BI
                              value={item.limitPrice}
                              placeholder="Limit"
                              onCommit={(v) =>
                                setChkLim(
                                  item.acct,
                                  item.strategy,
                                  "buy",
                                  item.idx,
                                  v,
                                )
                              }
                            />
                          </td>
                          <td
                            style={{
                              ...S.tdr,
                              fontWeight: 700,
                              fontSize: 14,
                              color: "#3fb950",
                            }}
                          >
                            {fmtSh0(item.shares)}
                          </td>
                          <td style={{ ...S.tdr, fontWeight: 600 }}>
                            {fmt(item.cost)}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                    <tfoot>
                      <tr
                        style={{
                          background: "#1f6feb08",
                          borderTop: "1px solid #30363d",
                        }}
                      >
                        <td
                          colSpan={3}
                          style={{
                            ...S.td,
                            fontWeight: 700,
                            color: "#8b949e",
                            fontSize: 11,
                          }}
                        >
                          ROUND TOTAL
                        </td>
                        <td style={S.tdr} />
                        <td style={{ ...S.tdr, fontWeight: 700 }}>
                          {fmtSh0(roundShares)}
                        </td>
                        <td
                          style={{ ...S.tdr, fontWeight: 700, color: accent }}
                        >
                          {fmt(roundEst)}
                        </td>
                      </tr>
                    </tfoot>
                  </table>
                )}
              </div>

              {/* ── footer nav ── */}
              <div
                style={{
                  display: "flex",
                  gap: 12,
                  justifyContent: "center",
                  marginTop: 16,
                }}
              >
                <button style={S.btn2} onClick={() => setTab("trades")}>
                  ← Trades
                </button>
                {ri < rounds.length - 1 ? (
                  <button
                    style={{ ...S.btn, background: accent }}
                    onClick={() => setEntryRound((r) => r + 1)}
                  >
                    Next Round →
                  </button>
                ) : (
                  <button
                    style={{ ...S.btn, background: "#1f6feb" }}
                    onClick={() => setTab("allocation")}
                  >
                    View Allocation →
                  </button>
                )}
              </div>
            </div>
          );
        };

        const renderSOP = () => (
          <div style={S.card}>
            <div style={S.cT}>Monthly Rebalance SOP</div>
            <div style={{ fontSize: 12, lineHeight: 1.8, color: "#c9d1d9" }}>
              <div
                style={{ fontWeight: 700, color: "#58a6ff", marginBottom: 4 }}
              >
                DAY BEFORE
              </div>
              <div style={{ paddingLeft: 16, marginBottom: 12 }}>
                1. Check SumGrowth/Gmail for signals → enter in Setup
                <br />
                2. Look up previous close for new ETFs
              </div>
              <div
                style={{ fontWeight: 700, color: "#58a6ff", marginBottom: 4 }}
              >
                TRADING DAY (Pre-Market)
              </div>
              <div style={{ paddingLeft: 16, marginBottom: 12 }}>
                3. Download 3 CSVs, paste, verify prices, Calculate
                <br />
                4. Review sell orders (share-driven, rounded to 100) and buy
                orders (dollar-driven, ≤$100K chunks)
                <br />
                5. Sold strategies get cash priority; all strategies scale
                proportionally from actual proceeds
              </div>
              <div
                style={{ fontWeight: 700, color: "#f85149", marginBottom: 4 }}
              >
                MARKET OPEN
              </div>
              <div style={{ paddingLeft: 16, marginBottom: 12 }}>
                <strong>TOD:</strong> All sells + buys simultaneously
                <br />
                <strong>IRAs:</strong> Sells → log fills → buys recalc
                proportionally → adjust limits per chunk → place buys → log
                fills
              </div>
              <div
                style={{ fontWeight: 700, color: "#3fb950", marginBottom: 4 }}
              >
                END OF DAY
              </div>
              <div style={{ paddingLeft: 16 }}>
                5. Check Allocation tab → cancel unfilled, retry next day
              </div>
            </div>
          </div>
        );

        return (
          <div style={S.container}>
            <div style={S.hdr}>Monthly Rebalance Trade Calculator</div>
            <div style={S.sub}>
              3 Accounts × 5 Strategies | $100K order chunks | Real-time fill
              tracking
            </div>
            {autoImportBanner && (
              <div
                style={{
                  ...S.err,
                  display: "flex",
                  justifyContent: "space-between",
                  alignItems: "center",
                }}
              >
                <span>{autoImportBanner}</span>
                <button
                  style={{ ...S.btnSm, marginLeft: 12, flexShrink: 0 }}
                  onClick={() => setAutoImportBanner(null)}
                >
                  ✕
                </button>
              </div>
            )}
            {restoredAt && !restoreBannerDismissed && (
              <div
                style={{
                  ...S.info,
                  display: "flex",
                  justifyContent: "space-between",
                  alignItems: "center",
                }}
              >
                <span>&#x1F4BE; Session restored from {restoredAt}</span>
                <button
                  style={{ ...S.btnSm, marginLeft: 12, flexShrink: 0 }}
                  onClick={() => setRestoreBannerDismissed(true)}
                >
                  ✕
                </button>
              </div>
            )}
            <div style={S.tabs}>
              {[
                ["setup", "📋 Setup"],
                ["trades", "📊 Trades"],
                ["entry", "📥 Entry"],
                ["allocation", "⚖️ Allocation"],
                ["sop", "📖 SOP"],
              ].map(([t, l]) => (
                <button
                  key={t}
                  style={S.tab(tab === t)}
                  onClick={() => setTab(t)}
                >
                  {l}
                </button>
              ))}
            </div>
            {tab === "setup" && renderSetup()}
            {tab === "trades" && renderTrades()}
            {tab === "entry" && renderEntry()}
            {tab === "allocation" && renderAlloc()}
            {tab === "sop" && renderSOP()}
          </div>
        );
      }

      ReactDOM.render(<App />, document.getElementById("root"));
    </script>
  </body>
</html>
